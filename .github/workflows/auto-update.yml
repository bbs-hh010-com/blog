name: Update Post List

on:
  push:
    paths:
      - 'posts/**.html'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate post list and update index.html
        run: node scripts/update-posts.js

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html sitemap.xml
          git diff --staged --quiet || git commit -m "chore: auto-update post list"
          git push
